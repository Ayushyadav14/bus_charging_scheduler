# ===========================================================================
# world.yaml - the physical world shared by all scenarios.
# Scenarios "extend" this and override only what differs (fleet, weights).
# Edit anything here and EVERY scenario that extends it changes. One place.
# ===========================================================================

schema_version: 1

physics:
  battery_range_km: 240      # range on a full charge
  charge_minutes: 25         # fixed, always-to-full
  speed_kmph: 60             # 60 => 1 km == 1 min

route:
  id: blr-kochi-main

  # Canonical FORWARD order (= BK). Reverse walk = KB. Direction is never a
  # special case in code, only which way this list is traversed.

  nodes:
    - { id: BLR,   name: Bengaluru, kind: endpoint, full_charge: true }
    - { id: A,     name: Station A, kind: station, chargers: 1 }
    - { id: B,     name: Station B, kind: station, chargers: 1 }
    - { id: C,     name: Station C, kind: station, chargers: 1 }
    - { id: D,     name: Station D, kind: station, chargers: 1 }
    - { id: KOCHI, name: Kochi,     kind: endpoint, full_charge: true }

  segments:
    - { from: BLR,   to: A,     distance_km: 100 }
    - { from: A,     to: B,     distance_km: 120 }
    - { from: B,     to: C,     distance_km: 100 }
    - { from: C,     to: D,     distance_km: 120 }
    - { from: D,     to: KOCHI, distance_km: 100 }

  directions:
    BK: { from: BLR, to: KOCHI }
    KB: { from: KOCHI, to: BLR }

# Which metric each soft rule uses (data, not code).

objective:
  individual: total_wait
  operator: fair_share
  overall: makespan

# Default weights, overridable per scenario.

weights:
  individual: 1.0
  operator: 1.0
  overall: 1.0

extensions: {}  # forward-compat bag - unknown keys preserved, never rejected